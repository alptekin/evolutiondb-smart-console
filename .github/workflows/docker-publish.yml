name: Docker Publish

on:
  push:
    branches: ['main']
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate date tag
        id: datetag
        run: |
          DATE=$(date -u +%Y%m%d)
          # Find next sequence number for today
          TAGS=$(git tag -l "v1.0.${DATE}.*" 2>/dev/null | sort -t. -k4 -n | tail -1)
          if [ -z "$TAGS" ]; then
            SEQ=1
          else
            SEQ=$(echo "$TAGS" | grep -oE '[0-9]+$')
            SEQ=$((SEQ + 1))
          fi
          echo "tag=v1.0.${DATE}.${SEQ}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: tpoal/evolutiondb-smart-console
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ steps.datetag.outputs.tag }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
